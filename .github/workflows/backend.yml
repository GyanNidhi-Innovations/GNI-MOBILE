name: Android Build (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "gni-app/**"

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gni-app

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gni-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p android --profile preview --non-interactive