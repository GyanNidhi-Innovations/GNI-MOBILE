name: Deploy GNI App Backend

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

  workflow_dispatch:

concurrency:
  group: gni-app-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy backend blue-green
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOYER_SSH_KEY }}

          script: |
            set -Eeuo pipefail

            # ============================================
            # CONFIGURATION
            # ============================================
            APP_DIR="/home/deploy/gni-app-backend"
            REPO_URL="git@github.com:${{ github.repository }}.git"

            COMPOSE_PROJECT="gni-app-backend"

            STATE_DIR="/home/deploy/.gni-backend"
            STATE_FILE="${STATE_DIR}/active-slot"

            PUBLIC_HEALTH_URL="https://demos.gyannidhi.in/gni-mobile-api/health"

            # ============================================
            # CONFIGURE REPOSITORY SSH KEY
            # ============================================
            echo "🔑 Configuring repository SSH key..."

            mkdir -p ~/.ssh

            cat > ~/.ssh/id_ed25519 <<'EOF'
            ${{ secrets.REPO_SSH_KEY }}
            EOF

            # Remove Windows carriage-return characters.
            sed -i 's/\r$//' ~/.ssh/id_ed25519

            chmod 600 ~/.ssh/id_ed25519

            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

            if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
              echo "❌ REPO_SSH_KEY is not a valid private SSH key"
              exit 1
            fi

            # ============================================
            # CLONE OR UPDATE REPOSITORY
            # ============================================
            echo "📁 Preparing repository..."

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "📥 Repository not found. Cloning..."

              rm -rf "$APP_DIR"

              GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
                git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            echo "🔄 Updating repository..."

            GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
              git fetch origin

            git reset --hard origin/main
            git clean -fd

            RELEASE="$(git rev-parse --short=12 HEAD)"
            IMAGE="gni-app-backend:${RELEASE}"

            echo "📌 Deploying release: ${RELEASE}"

            # ============================================
            # VERIFY REQUIRED FILES
            # ============================================
            echo "🔍 Verifying deployment requirements..."

            test -f backend/Dockerfile || {
              echo "❌ backend/Dockerfile is missing"
              exit 1
            }
                    
            test -f backend/docker-compose.yml || {
              echo "❌ backend/docker-compose.yml is missing"
              exit 1
            }
                    
            test -f backend/server.js || {
              echo "❌ backend/server.js is missing"
              exit 1
            }
                    
            test -f /etc/gni-app-backend.env || {
              echo "❌ /etc/gni-app-backend.env is missing"
              exit 1
            }
                    
            test -f /usr/local/sbin/gni-switch-backend || {
              echo "❌ Nginx switch script is missing"
              exit 1
            }
                    
            if ! sudo -n -l /usr/local/sbin/gni-switch-backend 5010 >/dev/null 2>&1; then
              echo "❌ deploy user is not authorized to run the Nginx switch script"
              exit 1
            fi
                    
            echo "✅ Deployment requirements verified"

            cd backend

            # ============================================
            # BUILD VERSIONED IMAGE
            # ============================================
            echo "🏗️ Building Docker image ${IMAGE}..."

            # Current backend remains online while this image builds.
            docker build \
              --pull \
              --label com.gyannidhi.app=gni-app-backend \
              --tag "$IMAGE" \
              .

            echo "✅ Docker image built successfully"

            # ============================================
            # DETERMINE ACTIVE AND INACTIVE SLOT
            # ============================================
            mkdir -p "$STATE_DIR"

            ACTIVE_SLOT="legacy"

            if [ -f "$STATE_FILE" ]; then
              ACTIVE_SLOT="$(cat "$STATE_FILE")"
            fi

            case "$ACTIVE_SLOT" in
              blue)
                ACTIVE_PORT="5011"
                ACTIVE_CONTAINER="gni-app-backend-blue"

                INACTIVE_SLOT="green"
                INACTIVE_PORT="5012"
                INACTIVE_SERVICE="backend-green"
                INACTIVE_CONTAINER="gni-app-backend-green"
                ;;

              green)
                ACTIVE_PORT="5012"
                ACTIVE_CONTAINER="gni-app-backend-green"

                INACTIVE_SLOT="blue"
                INACTIVE_PORT="5011"
                INACTIVE_SERVICE="backend-blue"
                INACTIVE_CONTAINER="gni-app-backend-blue"
                ;;

              legacy|*)
                # First blue-green deployment.
                # Current production backend remains on port 5010.
                ACTIVE_SLOT="legacy"
                ACTIVE_PORT="5010"
                ACTIVE_CONTAINER="gni-app-backend"

                INACTIVE_SLOT="blue"
                INACTIVE_PORT="5011"
                INACTIVE_SERVICE="backend-blue"
                INACTIVE_CONTAINER="gni-app-backend-blue"
                ;;
            esac

            echo "Current active slot: ${ACTIVE_SLOT}"
            echo "Current active port: ${ACTIVE_PORT}"
            echo "Deploying new release to: ${INACTIVE_SLOT}"
            echo "New release port: ${INACTIVE_PORT}"

            # ============================================
            # START INACTIVE SLOT
            # ============================================
            docker rm -f "$INACTIVE_CONTAINER" >/dev/null 2>&1 || true

            BACKEND_IMAGE="$IMAGE" \
            APP_RELEASE="$RELEASE" \
            BACKEND_ENV_FILE="/etc/gni-app-backend.env" \
              docker compose \
                -p "$COMPOSE_PROJECT" \
                up \
                -d \
                --no-deps \
                --no-build \
                --force-recreate \
                "$INACTIVE_SERVICE"

            # ============================================
            # CHECK NEW BACKEND LOCALLY
            # ============================================
            echo "🔍 Waiting for the new backend..."

            NEW_SLOT_READY=false

            for attempt in $(seq 1 30); do
              HEALTH_BODY="$(
                curl \
                  --fail \
                  --silent \
                  --show-error \
                  --connect-timeout 3 \
                  --max-time 10 \
                  "http://127.0.0.1:${INACTIVE_PORT}/health" \
                  2>/dev/null || true
              )"

              if echo "$HEALTH_BODY" | grep -q "$RELEASE"; then
                NEW_SLOT_READY=true
                echo "✅ New backend is healthy"
                echo "$HEALTH_BODY"
                break
              fi

              echo "Backend not ready: attempt ${attempt}/30"
              sleep 2
            done

            if [ "$NEW_SLOT_READY" != "true" ]; then
              echo "❌ New backend failed its health check"

              docker logs \
                --tail=200 \
                "$INACTIVE_CONTAINER" || true

              docker rm -f "$INACTIVE_CONTAINER" || true
              exit 1
            fi

            # ============================================
            # SWITCH NGINX
            # ============================================
            echo "🔀 Switching Nginx to port ${INACTIVE_PORT}..."

            sudo /usr/local/sbin/gni-switch-backend "$INACTIVE_PORT"

            # ============================================
            # VERIFY PUBLIC API
            # ============================================
            echo "🌐 Verifying public API..."

            PUBLIC_READY=false

            for attempt in $(seq 1 20); do
              PUBLIC_BODY="$(
                curl \
                  --fail \
                  --silent \
                  --show-error \
                  --connect-timeout 5 \
                  --max-time 15 \
                  "$PUBLIC_HEALTH_URL" \
                  2>/dev/null || true
              )"

              if echo "$PUBLIC_BODY" | grep -q "$RELEASE"; then
                PUBLIC_READY=true
                echo "✅ Public API is serving release ${RELEASE}"
                break
              fi

              echo "Public API not switched yet: attempt ${attempt}/20"
              sleep 2
            done

            # ============================================
            # ROLLBACK WHEN PUBLIC CHECK FAILS
            # ============================================
            if [ "$PUBLIC_READY" != "true" ]; then
              echo "❌ Public API verification failed"
              echo "↩️ Returning Nginx to port ${ACTIVE_PORT}"

              sudo /usr/local/sbin/gni-switch-backend "$ACTIVE_PORT"

              docker rm -f "$INACTIVE_CONTAINER" || true

              exit 1
            fi

            # ============================================
            # SAVE ACTIVE SLOT
            # ============================================
            printf '%s\n' "$INACTIVE_SLOT" > "${STATE_FILE}.tmp"
            mv "${STATE_FILE}.tmp" "$STATE_FILE"

            # Give existing requests time to complete.
            sleep 20

            # ============================================
            # STOP PREVIOUS BACKEND
            # ============================================
            if [ "$ACTIVE_SLOT" = "legacy" ]; then
              echo "🧹 Removing legacy backend container..."

              docker rm -f \
                "$ACTIVE_CONTAINER" >/dev/null 2>&1 || true
            else
              echo "🛑 Stopping previous ${ACTIVE_SLOT} backend..."

              docker stop \
                --time 30 \
                "$ACTIVE_CONTAINER" >/dev/null 2>&1 || true
            fi

            # Remove only dangling image layers.
            docker image prune -f >/dev/null 2>&1 || true

            # ============================================
            # FINAL STATUS
            # ============================================
            echo "📦 Backend containers:"

            docker ps -a \
              --filter "name=gni-app-backend" \
              --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo "🎯 Active slot: $(cat "$STATE_FILE")"
            echo "✅ Deployment completed successfully: ${RELEASE}"